name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Redact tokens, headers, private URLs, and local secrets.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which version or commit are you running?
      placeholder: "0.1.0 or commit hash"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: agent
    attributes:
      label: Agent target
      placeholder: "codex, cursor, claude-code, vscode"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact workflow.
      placeholder: |
        1. Open MCPM
        2. Add ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or config output
      description: Redact secrets before pasting.
      render: text
