name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: input
    id: agent
    attributes:
      label: Related agent or MCP server
      placeholder: "Optional"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, screenshots, or config examples without secrets.
