name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            mac-arch: aarch64

          - name: macOS Intel
            platform: macos-15-intel
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
            mac-arch: x64

          - name: Windows
            platform: windows-latest
            args: ""
            rust-target: ""
            mac-arch: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check product copy and translations
        run: pnpm run check:copy

      - name: Typecheck frontend
        run: pnpm run typecheck

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MCPM ${{ github.ref_name }}"
          releaseBody: "Release notes: https://github.com/${{ github.repository }}/blob/main/docs/releases/${{ github.ref_name }}.md"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build helper DMG
        if: matrix.mac-arch != ''
        shell: bash
        run: |
          chmod +x scripts/macos/create-helper-dmg.sh scripts/macos/repair-mcpm.command
          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/MCPM.app"
          OUTPUT_DMG="src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/MCPM_${VERSION}_${{ matrix.mac-arch }}_with-helper.dmg"
          scripts/macos/create-helper-dmg.sh "$APP_PATH" "$OUTPUT_DMG" "MCPM ${GITHUB_REF_NAME}"
          echo "HELPER_DMG=$OUTPUT_DMG" >> "$GITHUB_ENV"

      - name: Upload helper DMG
        if: matrix.mac-arch != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$HELPER_DMG" --clobber
