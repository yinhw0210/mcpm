<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">MCPM debug console screenshot placeholder</title>
  <desc id="desc">A placeholder frame for the debug console screenshot.</desc>
  <rect width="1440" height="900" fill="#020617"/>
  <rect x="64" y="64" width="1312" height="128" rx="18" fill="#111827" stroke="#334155"/>
  <rect x="64" y="228" width="1312" height="450" rx="18" fill="#0b1220" stroke="#334155"/>
  <rect x="64" y="716" width="1312" height="120" rx="18" fill="#111827" stroke="#334155"/>
