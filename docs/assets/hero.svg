    <circle cx="1184" cy="410" r="8" fill="#38bdf8"/>
    <text x="1208" y="405" fill="#e5e7eb" font-weight="700">filesystem</text>
    <text x="1208" y="428" fill="#94a3b8">PID 4218 · 34 MB</text>
    <rect x="1152" y="470" width="256" height="72" rx="16" fill="#172033"/>
    <circle cx="1184" cy="506" r="8" fill="#f59e0b"/>
