  <text x="440" y="238" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">One server. Many agents.</text>
  <text x="440" y="274" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Install, sync, inspect, and debug MCP configs from one desktop app.</text>
  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.86">
