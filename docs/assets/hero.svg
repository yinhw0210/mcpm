<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MCPM interface preview</title>
  <desc id="desc">A desktop app preview showing MCP servers connected to multiple AI coding agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#12211b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#182235"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="108" y="88" width="1384" height="724" rx="34" fill="#0b1120" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <rect x="108" y="88" width="1384" height="64" rx="34" fill="#111827"/>
  <circle cx="150" cy="120" r="7" fill="#ef4444"/>
  <circle cx="174" cy="120" r="7" fill="#f59e0b"/>
  <circle cx="198" cy="120" r="7" fill="#22c55e"/>
