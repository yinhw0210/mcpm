  <rect x="140" y="184" width="224" height="584" rx="22" fill="#0f172a" stroke="#1f2937"/>
  <text x="174" y="232" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Servers</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15">
    <rect x="166" y="266" width="172" height="42" rx="10" fill="#172033"/>
    <text x="188" y="293" fill="#e5e7eb">github</text>
    <rect x="166" y="324" width="172" height="42" rx="10" fill="#0b1220" stroke="#243044"/>
    <text x="188" y="351" fill="#94a3b8">context7</text>
